name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  test:
    name: Node ${{ matrix.node-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        node-version:
          - "14.x"
          - "16.x"
          - "18.x"
          - "20.x"
          - "22.x"
        include:
          - os: ubuntu-latest
            node-version: "4.x"
          - os: ubuntu-latest
            node-version: "6.x"
          - os: ubuntu-latest
            node-version: "8.x"
          - os: ubuntu-latest
            node-version: "10.x"
          - os: ubuntu-latest
            node-version: "12.x"
          - os: windows-latest
            node-version: "4.x"
          - os: windows-latest
            node-version: "6.x"
          - os: windows-latest
            node-version: "8.x"
          - os: windows-latest
            node-version: "10.x"
          - os: windows-latest
            node-version: "12.x"
        exclude:
          # Node 14 has no prebuilt binary for macOS arm64
          - os: macos-latest
            node-version: "14.x"
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm install --ignore-scripts
      - name: Run tests
        run: npm test -- --reporter dot
